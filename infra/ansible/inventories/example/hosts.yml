all:
  children:
    operator_hosts:
      hosts:
        operator_1:
          ansible_host: REPLACE_WITH_OPERATOR_1_HOST
          ansible_user: ubuntu
          host_name: operator-1
        operator_2:
          ansible_host: REPLACE_WITH_OPERATOR_2_HOST
          ansible_user: ubuntu
          host_name: operator-2
        operator_3:
          ansible_host: REPLACE_WITH_OPERATOR_3_HOST
          ansible_user: ubuntu
          host_name: operator-3
        operator_4:
          ansible_host: REPLACE_WITH_OPERATOR_4_HOST
          ansible_user: ubuntu
          host_name: operator-4
      vars:
        cluster_name: treasury-mainnet-obol-a
        deployment_path: /opt/obol/treasury-mainnet-obol-a
        secure_config_dir: /secure/config
        artifact_source_dir: /var/lib/eth-treasury-operator-artifacts/treasury-mainnet-obol-a
        approval_dir: /secure/approvals/active
        cdvn_remote_dir: /tmp/eth-treasury-cdvn
        cdvn_render_dir: /tmp/cdvn-operator-runtime
        rollout_approval_file: /secure/approvals/active/rollout-approval.env
        artifact_approval_file: /secure/approvals/active/charon-artifact-approval.env
        health_sync_endpoint_url: http://127.0.0.1:4000/v1/health/sync
