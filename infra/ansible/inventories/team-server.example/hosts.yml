all:
  children:
    team_server:
      hosts:
        team_server_1:
          ansible_host: REPLACE_WITH_TEAM_SERVER_HOST_OR_IP
          ansible_user: ubuntu
      vars:
        # systemd: install Node/PostgreSQL on the host and run API/Web as systemd services.
        # compose: run API/Web/PostgreSQL together with Docker Compose.
        control_plane_deploy_mode: compose
        control_plane_api_port: 4000
        control_plane_web_port: 3000
        control_plane_api_base_url: http://REPLACE_WITH_TEAM_SERVER_HOST_OR_IP:4000
        control_plane_app_base_url: http://REPLACE_WITH_TEAM_SERVER_HOST_OR_IP:3000
        control_plane_auth_secret: REPLACE_WITH_LONG_RANDOM_AUTH_SECRET
        control_plane_health_sync_token: REPLACE_WITH_LONG_RANDOM_SYNC_TOKEN
        control_plane_postgres_database: eth_staking_automation
        control_plane_postgres_user: eth_staking_app
        control_plane_postgres_password: REPLACE_WITH_LONG_RANDOM_DB_PASSWORD
