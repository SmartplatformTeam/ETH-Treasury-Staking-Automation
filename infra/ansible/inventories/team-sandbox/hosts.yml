---
# Sandbox inventory for Phase 2-1 dev verification.
# The control-plane API container reaches the host via host.docker.internal
# (mapped to host-gateway in compose extra_hosts) and SSHs as the host user.
#
# This inventory targets a *sandbox* cluster name (team-sandbox-obol-a) and
# uses dedicated /opt/obol/<sandbox-cluster> + /secure/config/<sandbox-cluster>
# paths so it never touches the existing production-style obol operation on
# the same host.
#
# Public-safe placeholders only. No secrets. Override ansible_user with
# AUTOMATION_INVENTORY_USER env or per-deployment group_vars when targeting
# real bare-metal operator hosts.

all:
  children:
    operator_hosts:
      hosts:
        operator_sandbox_1:
          ansible_host: host.docker.internal
          ansible_user: smartplatform
          host_name: operator-sandbox-1
      vars:
        cluster_name: team-sandbox-obol-a
        deployment_path: /opt/obol/team-sandbox-obol-a
        secure_config_dir: /secure/config/team-sandbox-obol-a
        artifact_source_dir: /var/lib/eth-treasury-operator-artifacts/team-sandbox-obol-a
        approval_dir: /secure/approvals/active
        cdvn_remote_dir: /tmp/eth-treasury-cdvn
        cdvn_render_dir: /tmp/cdvn-operator-runtime-team-sandbox
        rollout_approval_file: /secure/approvals/active/team-sandbox-rollout-approval.env
        artifact_approval_file: /secure/approvals/active/team-sandbox-charon-artifact-approval.env
        health_sync_endpoint_url: http://127.0.0.1:4000/v1/internal/cdvn/health-sync
        ansible_private_key_file: /root/.ssh/id_ed25519
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        ansible_python_interpreter: /usr/bin/python3
