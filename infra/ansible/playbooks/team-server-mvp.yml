---
- name: Deploy Control Plane MVP to one Ubuntu team server
  hosts: team_server
  gather_facts: true
  roles:
    - role: control_plane
      vars:
        control_plane_install_node: "{{ (control_plane_deploy_mode | default('systemd')) == 'systemd' }}"
        control_plane_manage_local_postgres: "{{ (control_plane_deploy_mode | default('systemd')) == 'systemd' }}"
        control_plane_schema_mode: push
        control_plane_seed_database: true
