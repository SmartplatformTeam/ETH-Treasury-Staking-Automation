- name: Show sanitized compose Web health check failure
  ansible.builtin.debug:
    msg:
      - "Web health check failed. Sanitized compose ps and logs follow."
      - "{{ control_plane_web_compose_ps.stdout | default('') | replace(control_plane_effective_database_url, '[DATABASE_URL]') | replace(control_plane_postgres_password, '[DB_PASSWORD]') | replace((control_plane_postgres_password | urlencode), '[DB_PASSWORD]') }}"
      - "{{ control_plane_web_compose_ps.stderr | default('') | replace(control_plane_effective_database_url, '[DATABASE_URL]') | replace(control_plane_postgres_password, '[DB_PASSWORD]') | replace((control_plane_postgres_password | urlencode), '[DB_PASSWORD]') }}"
      - "{{ control_plane_web_compose_logs.stdout | default('') | replace(control_plane_effective_database_url, '[DATABASE_URL]') | replace(control_plane_postgres_password, '[DB_PASSWORD]') | replace((control_plane_postgres_password | urlencode), '[DB_PASSWORD]') }}"
      - "{{ control_plane_web_compose_logs.stderr | default('') | replace(control_plane_effective_database_url, '[DATABASE_URL]') | replace(control_plane_postgres_password, '[DB_PASSWORD]') | replace((control_plane_postgres_password | urlencode), '[DB_PASSWORD]') }}"
  when:
